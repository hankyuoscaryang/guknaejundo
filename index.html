<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국내전도 지원신청 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:740px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:18px;font-weight:600;margin-bottom:1.5rem;color:#1a1a1a}
.tab-bar{display:flex;border-bottom:1px solid #e0e0d8;margin-bottom:1.5rem}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:500}
.section{display:none}.section.active{display:block}

/* 공통 */
.card{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px}
.req{color:#e24b4a;margin-left:2px}
.field input,.field select,.field textarea{width:100%;font-size:14px;border-radius:8px;border:1px solid #d0d0c8;padding:9px 12px;background:#fff;color:#1a1a1a;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#185fa5}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-label{font-size:11px;font-weight:600;color:#888;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px}

/* 이벤트 배너 */
.event-banner{background:#f0f0e8;border:1px solid #e0e0d0;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.dot-open{background:#3b6d11}.dot-closed{background:#e24b4a}
.event-label{font-size:11px;color:#666;margin-bottom:4px;display:flex;align-items:center}
.event-item{font-size:22px;font-weight:600;margin-bottom:5px}
.event-period{font-size:13px;color:#666}
.event-period span{color:#1a1a1a;font-weight:500}
.event-desc{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;font-size:14px;line-height:1.8;white-space:pre-wrap}
.event-closed{background:#feecec;border:1px solid #f09595;border-radius:12px;padding:1rem 1.5rem;margin-bottom:1.5rem;color:#a32d2d;font-size:14px;text-align:center}

/* 교회 유형 */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.type-item{padding:11px 8px;border:1px solid #e0e0d0;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:#888;transition:all 0.15s}
.type-item:hover{border-color:#aaa;background:#f8f8f0;color:#1a1a1a}
.type-item.selected{border-color:#185fa5;background:#e6f1fb;color:#185fa5}

/* 수량 */
.qty-row{display:flex;gap:8px}
.qty-row input[type=number]{flex:1;-moz-appearance:textfield}
.qty-row input[type=number]::-webkit-inner-spin-button,.qty-row input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.qty-unit{display:flex;align-items:center;padding:9px 14px;background:#f0f0e8;border:1px solid #d0d0c8;border-radius:8px;font-size:14px;color:#666;white-space:nowrap}

/* 버튼 */
.submit-btn{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;font-weight:500}
.submit-btn:hover{background:#333}
.submit-btn:disabled{opacity:0.35;cursor:not-allowed}
.save-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:7px 18px;font-size:13px;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#f5f5f0}

/* 파트너 힌트 */
.partner-hint{margin-top:5px;font-size:12px;color:#666;min-height:18px}

/* 확인 팝업 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:4px}
.modal .sub{font-size:12px;color:#888;margin-bottom:1.25rem}
.confirm-box{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#f5f5f0;border-radius:8px;margin-bottom:1.25rem}
.confirm-box .clabel{font-size:11px;color:#888;margin-bottom:3px}
.confirm-box .cvalue{font-size:14px;font-weight:500;line-height:1.5}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-back{padding:10px;background:#fff;border:1px solid #ccc;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-confirm{padding:10px;background:#1a1a1a;border:none;border-radius:8px;font-size:14px;cursor:pointer;color:#fff;font-family:inherit}

/* 성공 */
.success-box{background:#eaf3de;border:1px solid #97c459;border-radius:12px;padding:2rem;text-align:center}
.success-box p{color:#3b6d11;font-size:14px;line-height:1.7}

/* 관리자 잠금 */
.admin-lock{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:2rem;text-align:center;max-width:320px;margin:0 auto}
.admin-lock h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.admin-lock input{width:100%;font-size:16px;border-radius:8px;border:1px solid #d0d0c8;padding:10px 12px;text-align:center;letter-spacing:6px;margin-bottom:10px;font-family:inherit}
.admin-lock button{width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.admin-panel{display:none}.admin-panel.open{display:block}

/* 통계 */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:12px 14px}
.stat-card .n{font-size:22px;font-weight:600}
.stat-card .l{font-size:11px;color:#888;margin-bottom:4px}

/* 노회 차트 */
.nohoe-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nohoe-label{font-size:12px;color:#666;width:100px;flex-shrink:0;text-align:right}
.nohoe-bar-wrap{flex:1;background:#f0f0e8;border-radius:4px;height:18px;overflow:hidden}
.nohoe-bar{height:100%;background:#185fa5;border-radius:4px;transition:width 0.4s}
.nohoe-cnt{font-size:12px;font-weight:500;width:28px;flex-shrink:0}

/* 필터 */
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-row select,.filter-row input{font-size:13px;border-radius:8px;border:1px solid #d8d8d0;padding:7px 10px;background:#fff;font-family:inherit}
.filter-row input{flex:1;min-width:140px}
.list-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.export-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.export-btn:hover{background:#f5f5f0}

/* 목록 */
.list-hd{display:grid;grid-template-columns:1.8fr 1.3fr 1fr 1.6fr 0.5fr;gap:6px;padding:8px 12px;font-size:11px;color:#888;background:#f5f5f0;border-radius:8px 8px 0 0;border:1px solid #e0e0d8;border-bottom:none}
.list-row{display:grid;grid-template-columns:1.8fr 1.3fr 1fr 1.6fr 0.5fr;gap:6px;padding:10px 12px;font-size:13px;border:1px solid #e0e0d8;border-top:none;background:#fff}
.list-row:hover{background:#f8f8f3}
.list-row:last-child{border-radius:0 0 8px 8px}
.no-data{padding:2rem;text-align:center;color:#aaa;font-size:13px;border:1px solid #e0e0d8;border-top:none;border-radius:0 0 8px 8px;background:#fff}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px}
.del-btn:hover{color:#e24b4a}
.cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-row{display:flex;align-items:center;gap:8px;margin-top:10px;justify-content:center}
.pg-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;font-family:inherit}
.pg-btn:disabled{opacity:0.3;cursor:not-allowed}
.pg-info{font-size:12px;color:#888}

/* 토글 */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:10px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;background:#ccc;border-radius:11px;cursor:pointer;transition:0.2s}
.slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s}
.toggle input:checked+.slider{background:#3b6d11}
.toggle input:checked+.slider:before{transform:translateX(18px)}

@media(max-width:480px){
  .row2{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .type-grid{grid-template-columns:repeat(3,1fr)}
  .list-hd,.list-row{grid-template-columns:2fr 1.2fr 0.4fr}
  .list-hd span:nth-child(3),.list-hd span:nth-child(4),
  .list-row span:nth-child(3),.list-row span:nth-child(4){display:none}
}
</style>
</head>
<body>
<div class="app">
  <h1>📋 서울광염교회 국내전도 지원신청</h1>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('apply')">신청하기</button>
    <button class="tab" onclick="switchTab('admin')">관리자</button>
  </div>

  <!-- 신청 탭 -->
  <div class="section active" id="tab-apply">
    <div id="apply-content"></div>
  </div>

  <!-- 관리자 탭 -->
  <div class="section" id="tab-admin">
    <div id="admin-lock-wrap">
      <div class="admin-lock">
        <h3>🔒 관리자 로그인</h3>
        <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
        <button onclick="checkPw()">로그인</button>
        <p style="font-size:12px;color:#aaa;margin-top:10px">초기 비밀번호: 1234</p>
      </div>
    </div>
    <div class="admin-panel" id="admin-panel">
      <div class="card">
        <div class="section-label">이벤트 설정</div>
        <div class="field"><label>지원 항목명</label><input id="s-item" placeholder="예: 스피커, 텀블러, 책..."></div>
        <div class="row2">
          <div class="field"><label>신청 시작일</label><input type="date" id="s-start"></div>
          <div class="field"><label>신청 마감일</label><input type="date" id="s-end"></div>
        </div>
        <div class="field"><label>수량 단위</label><input id="s-unit" placeholder="예: 개, 권, 박스..."></div>
        <div class="field"><label>이벤트 안내 (신청 화면에 표시)</label><textarea id="s-desc" placeholder="지원 설명, 조건, 배송 안내 등을 자유롭게 작성하세요..."></textarea></div>
        <div class="toggle-row">
          <label style="font-size:14px">신청 받기</label>
          <label class="toggle"><input type="checkbox" id="s-open" checked><span class="slider"></span></label>
        </div>
        <button class="save-btn" onclick="saveSettings()">💾 설정 저장</button>
        <button class="save-btn" onclick="clearData()" style="margin-left:8px;color:#e24b4a;border-color:#e24b4a">🗑 신청 데이터 초기화</button>
      </div>

      <div class="stats-row" id="admin-stats"></div>

      <div class="card">
        <div class="section-label" style="margin-bottom:12px">노회별 신청 현황</div>
        <div id="nohoe-chart"></div>
      </div>

      <div class="list-actions">
        <span class="section-label" style="margin:0">신청 목록 (<span id="list-count">0</span>건)</span>
        <button class="export-btn" onclick="exportCSV()">⬇ CSV 내보내기</button>
      </div>
      <div class="filter-row">
        <input type="text" id="f-search" placeholder="교회명 / 목사님 검색..." oninput="renderList()">
        <select id="f-nohoe-filter" onchange="renderList()"><option value="">전체 노회</option></select>
      </div>
      <div class="list-hd"><span>교회명</span><span>노회</span><span>연락처</span><span>주소</span><span></span></div>
      <div id="admin-list"></div>
      <div class="page-row">
        <button class="pg-btn" id="pg-prev" onclick="changePage(-1)">← 이전</button>
        <span class="pg-info" id="pg-info"></span>
        <button class="pg-btn" id="pg-next" onclick="changePage(1)">다음 →</button>
      </div>
    </div>
  </div>
</div>

<!-- 주소 확인 팝업 -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <h3>📦 배송지 주소를 확인해주세요</h3>
    <p class="sub">아래 주소로 택배가 발송됩니다. 정확한지 확인 후 제출해주세요.</p>
    <div class="confirm-box">
      <div>
        <div class="clabel">입력하신 주소</div>
        <div class="cvalue" id="confirm-address"></div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-back" onclick="closeConfirm()">← 수정하기</button>
      <button class="btn-confirm" onclick="finalSubmit()">맞습니다, 제출하기</button>
    </div>
  </div>
</div>

<script>
const NOHOE_LIST=[
  {name:'강동노회',pastor:'이강선 목사'},
  {name:'전서노회',pastor:'류병택 목사'},
  {name:'제주노회',pastor:'박창건 목사'},
  {name:'진주노회',pastor:'정계규 목사'},
  {name:'황해노회',pastor:'한종근 목사'},
  {name:'구미노회',pastor:'안순범 목사'},
  {name:'무안노회',pastor:'이윤동 목사'},
  {name:'경중노회',pastor:'박종민 목사'},
  {name:'충북동노회',pastor:'권혁일 목사'},
  {name:'서산태안지역',pastor:'이광희 목사'},
  {name:'공주논산지역',pastor:'김창수 목사'},
  {name:'여수지역',pastor:'왕재권 목사'},
  {name:'무지역',pastor:'김권능 목사'},
  {name:'이주민교회연합',pastor:''},
];
const CHURCH_TYPES=['자립지향교회','차상위교회','자립교회'];

const DEFAULT_SETTINGS={item:'2026년 전도건빵 축제',unit:'박스',start:'2026-03-13',end:'2026-03-21',desc:'2026 국내전도 파트너노회 전도건빵 축제 이벤트입니다.\n신청하신 교회에 전도건빵을 발송해 드립니다.\n정확한 주소를 입력해 주세요.',open:true};
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwbQ3hNau9LUstzxKEhSPdFpRrF80r0D_9PLnOHqe7OCk80Ppr6Jm4XV3FhQ9upVp0C/exec';
const SETTINGS_VER='v2026-03-13';function loadSettings(){try{const v=localStorage.getItem('gj_ver');const s=localStorage.getItem('gj_settings');if(v===SETTINGS_VER&&s){return JSON.parse(s);}localStorage.setItem('gj_ver',SETTINGS_VER);localStorage.setItem('gj_settings',JSON.stringify(DEFAULT_SETTINGS));return DEFAULT_SETTINGS;}catch(e){return DEFAULT_SETTINGS;}}
let settings=loadSettings();

function loadApplications(){try{const a=localStorage.getItem('gj_apps');const n=localStorage.getItem('gj_nextid');if(a){applications=JSON.parse(a);nextId=n?parseInt(n):applications.length+1;}}catch(e){}}
let applications=[];

let nextId=1, selectedType=null, pendingEntry=null, currentPage=1;
const PAGE_SIZE=20;

function isOpen(){
  if(!settings.open)return false;
  const t=new Date().toISOString().slice(0,10);
  return t>=settings.start&&t<=settings.end;
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='apply')||(i===1&&t==='admin')));
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',(i===0&&t==='apply')||(i===1&&t==='admin')));
  if(t==='apply'){settings=loadSettings();renderApply();}
}
function onNohoeChange(){
  const s=document.getElementById('f-nohoe'),h=document.getElementById('partner-hint');
  if(!s||s.value===''){if(h)h.textContent='';return;}
  const p=NOHOE_LIST[parseInt(s.value)].pastor;
  if(h)h.textContent=p?'파트너 목사: '+p:'';
}
function selectType(i){
  selectedType=i;
  document.querySelectorAll('.type-item').forEach((el,j)=>el.classList.toggle('selected',j===i));
}
function renderApply(){
  selectedType=null;pendingEntry=null;
  const open=isOpen();
  let html=`<div class="event-banner">
    <div class="event-label"><span class="dot ${open?'dot-open':'dot-closed'}"></span>${open?'신청 진행 중':'신청 종료'}</div>
    <div class="event-item">${settings.item}</div>
    <div class="event-period">신청 기간: <span>${settings.start}</span> ~ <span>${settings.end}</span></div>
  </div>`;
  if(settings.desc)html+=`<div class="event-desc">${settings.desc}</div>`;
  if(!open)html+=`<div class="event-closed">현재 진행 중인 지원 이벤트가 없습니다</div>`;
  html+=`<div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:1.25rem">지원 신청서</div>
    <div class="field"><label>노회 선택 <span class="req">*</span></label>
      <select id="f-nohoe" onchange="onNohoeChange()">
        <option value="">— 노회를 선택하세요 —</option>
        ${NOHOE_LIST.map((n,i)=>`<option value="${i}">${n.name}${n.pastor?' ('+n.pastor+')':''}</option>`).join('')}
      </select>
      <div class="partner-hint" id="partner-hint"></div>
    </div>
    <div class="field"><label>교회 유형 <span class="req">*</span></label>
      <div class="type-grid">${CHURCH_TYPES.map((t,i)=>`<div class="type-item" onclick="selectType(${i})">${t}</div>`).join('')}</div>
    </div>
    <div class="row2">
      <div class="field"><label>교회명 <span class="req">*</span></label><input id="f-church" placeholder="예: 소망교회"></div>
      <div class="field"><label>담임목사 성함 <span class="req">*</span></label><input id="f-pastor" placeholder="예: 홍길동"></div>
    </div>
    <div class="row2">
      <div class="field"><label>연락처 <span class="req">*</span></label>
        <div style="display:flex;align-items:center;border:1px solid #d0d0c8;border-radius:8px;overflow:hidden;background:#fff">
          <span style="padding:9px 10px 9px 12px;font-size:14px;color:#1a1a1a;background:#f0f0e8;border-right:1px solid #d0d0c8;white-space:nowrap;flex-shrink:0">010</span>
          <input id="f-phone" type="tel" maxlength="8" placeholder="00000000" inputmode="numeric"
            style="border:none;border-radius:0;flex:1;font-size:14px;padding:9px 12px;outline:none;background:#fff;color:#1a1a1a"
            oninput="this.value=this.value.replace(/[^0-9]/g,\'\').slice(0,8)">
        </div>
      </div>
      <div class="field"><label>수량 <span class="req">*</span></label>
        <div class="qty-row"><input type="number" id="f-qty" placeholder="0" min="1" max="9999"><div class="qty-unit">${settings.unit}</div></div>
      </div>
    </div>
    <div class="field"><label>교회 주소 <span class="req">*</span></label><input id="f-address" placeholder="예: 서울특별시 강북구 수유동 123-45"></div>
    <button class="submit-btn" onclick="submitApp()" ${open?'':'disabled'}>${open?`${settings.item} 신청하기`:'현재 신청 기간이 아닙니다'}</button>
  </div>`;
  document.getElementById('apply-content').innerHTML=html;
}
function submitApp(){
  const ni=document.getElementById('f-nohoe').value;
  if(ni===''){alert('노회를 선택해주세요');return;}
  if(selectedType===null){alert('교회 유형을 선택해주세요');return;}
  const ch=document.getElementById('f-church').value.trim(),pa=document.getElementById('f-pastor').value.trim();
  const ph='010'+document.getElementById('f-phone').value.trim(),ad=document.getElementById('f-address').value.trim();
  const qt=document.getElementById('f-qty').value.trim();
  const phoneRaw=document.getElementById('f-phone').value.trim();
  if(!ch||!pa||!phoneRaw||!ad||!qt){alert('필수 항목을 모두 입력해주세요');return;}
  if(phoneRaw.length!==8){alert('연락처 뒷자리 8자리를 모두 입력해주세요');return;}
  if(parseInt(qt)<1||isNaN(parseInt(qt))){alert('수량을 올바르게 입력해주세요');return;}
  const n=NOHOE_LIST[parseInt(ni)];
  pendingEntry={id:nextId,church:ch,nohoe:n.name,partner:n.pastor,pastor:pa,phone:ph,address:ad,type:CHURCH_TYPES[selectedType],qty:parseInt(qt),unit:settings.unit};
  document.getElementById('confirm-address').textContent=ad;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');pendingEntry=null;}
function finalSubmit(){
  if(!pendingEntry)return;
  applications.push(pendingEntry);nextId++;try{localStorage.setItem('gj_apps',JSON.stringify(applications));localStorage.setItem('gj_nextid',nextId);}catch(e){}
  const e=pendingEntry;pendingEntry=null;
  document.getElementById('confirm-modal').classList.remove('open');
  document.getElementById('apply-content').innerHTML=`<div class="success-box"><p style="font-size:28px;margin-bottom:10px">✓</p><p style="font-size:16px;font-weight:600;margin-bottom:8px">신청이 완료되었습니다</p><p>${e.church} (${e.pastor} 목사님)<br>${settings.item} ${e.qty}${e.unit} 신청이 접수되었습니다.<br>담당자가 확인 후 연락드리겠습니다.</p></div>`;
  // 구글 시트에 저장
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({item:settings.item,church:e.church,nohoe:e.nohoe,pastor:e.pastor,phone:e.phone,type:e.type,address:e.address,qty:e.qty,unit:e.unit}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
}
function checkPw(){
  if(document.getElementById('pw-input').value==='1234'){
    document.getElementById('admin-lock-wrap').style.display='none';
    document.getElementById('admin-panel').classList.add('open');
    renderAdmin();
  }else{alert('비밀번호가 틀렸습니다');}
}
function saveSettings(){
  settings.item=document.getElementById('s-item').value||settings.item;
  settings.unit=document.getElementById('s-unit').value||settings.unit;
  settings.start=document.getElementById('s-start').value||settings.start;
  settings.end=document.getElementById('s-end').value||settings.end;
  settings.desc=document.getElementById('s-desc').value;
  settings.open=document.getElementById('s-open').checked;
  try{localStorage.setItem('gj_settings',JSON.stringify(settings));localStorage.setItem('gj_ver',SETTINGS_VER);}catch(e){}
  renderAdmin();alert('저장되었습니다! 신청 화면에 바로 반영됩니다.');
}
function clearData(){
  if(confirm('⚠️ 신청 데이터를 전부 삭제할까요?\n새 이벤트 시작 전에만 사용하세요!')){
    applications=[];nextId=1;try{localStorage.removeItem('gj_apps');localStorage.removeItem('gj_nextid');}catch(e){}renderAdmin();alert('초기화 완료!');
  }
}
function getFiltered(){
  const q=(document.getElementById('f-search')||{}).value?.toLowerCase()||'';
  const nf=(document.getElementById('f-nohoe-filter')||{}).value||'';
  return applications.filter(a=>{
    if(nf&&a.nohoe!==nf)return false;
    if(q&&!(a.church.toLowerCase().includes(q)||a.pastor.toLowerCase().includes(q)))return false;
    return true;
  });
}
function renderAdmin(){
  document.getElementById('s-item').value=settings.item;
  document.getElementById('s-unit').value=settings.unit;
  document.getElementById('s-start').value=settings.start;
  document.getElementById('s-end').value=settings.end;
  document.getElementById('s-desc').value=settings.desc;
  document.getElementById('s-open').checked=settings.open;
  const total=applications.length,qty=applications.reduce((s,a)=>s+a.qty,0);
  const nc=new Set(applications.map(a=>a.nohoe)).size;
  document.getElementById('admin-stats').innerHTML=
    `<div class="stat-card"><div class="l">총 신청 교회</div><div class="n">${total}</div></div>`+
    `<div class="stat-card"><div class="l">총 신청 수량</div><div class="n">${qty}${settings.unit}</div></div>`+
    `<div class="stat-card"><div class="l">참여 노회</div><div class="n">${nc}</div></div>`+
    `<div class="stat-card"><div class="l">미참여 노회</div><div class="n">${NOHOE_LIST.length-nc}</div></div>`;
  const nMap={};applications.forEach(a=>{nMap[a.nohoe]=(nMap[a.nohoe]||0)+1;});
  const sorted=Object.entries(nMap).sort((a,b)=>b[1]-a[1]),max=sorted[0]?sorted[0][1]:1;
  document.getElementById('nohoe-chart').innerHTML=sorted.map(([n,c])=>`
    <div class="nohoe-row"><div class="nohoe-label">${n}</div>
    <div class="nohoe-bar-wrap"><div class="nohoe-bar" style="width:${Math.round(c/max*100)}%"></div></div>
    <div class="nohoe-cnt">${c}건</div></div>`).join('');
  const nf=document.getElementById('f-nohoe-filter'),cur=nf.value;
  nf.innerHTML='<option value="">전체 노회</option>'+sorted.map(([n])=>`<option value="${n}"${n===cur?'selected':''}>${n}</option>`).join('');
  renderList();
}
function renderList(){currentPage=1;renderPage();}
function renderPage(){
  const filtered=getFiltered(),total=filtered.length;
  document.getElementById('list-count').textContent=total;
  const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>pages)currentPage=pages;
  const slice=filtered.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  const list=document.getElementById('admin-list');
  if(!slice.length){list.innerHTML='<div class="no-data">검색 결과가 없습니다</div>';}
  else list.innerHTML=slice.map(a=>`
    <div class="list-row">
      <span class="cell">${a.church}<br><span style="font-size:11px;color:#888">${a.pastor} 목사</span></span>
      <span class="cell" style="font-size:12px">${a.nohoe}</span>
      <span class="cell" style="font-size:12px">${a.phone}</span>
      <span class="cell" style="font-size:11px;color:#888" title="${a.address}">${a.address.slice(0,22)}${a.address.length>22?'…':''}</span>
      <span><button class="del-btn" onclick="delApp(${a.id})">✕</button></span>
    </div>`).join('');
  document.getElementById('pg-info').textContent=`${currentPage} / ${pages}`;
  document.getElementById('pg-prev').disabled=currentPage<=1;
  document.getElementById('pg-next').disabled=currentPage>=pages;
}
function changePage(d){currentPage+=d;renderPage();}
function delApp(id){
  if(confirm('이 항목을 삭제할까요?')){applications=applications.filter(a=>a.id!==id);try{localStorage.setItem('gj_apps',JSON.stringify(applications));}catch(e){}renderAdmin();}
}
function exportCSV(){
  const filtered=getFiltered();
  const rows=[['교회명','노회','담임목사','연락처','교회유형','주소','수량'],
    ...filtered.map(a=>[a.church,a.nohoe,a.pastor,a.phone,a.type,a.address,a.qty+(a.unit||'권')])];
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const el=document.createElement('a');el.href=URL.createObjectURL(blob);
  el.download=`${settings.item}_신청목록_${new Date().toISOString().slice(0,10)}.csv`;el.click();
}
loadApplications();renderApply();
</script>
</body>
</html>
